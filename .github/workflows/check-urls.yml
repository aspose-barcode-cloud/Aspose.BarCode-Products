name: Check URLs

on:
  # Allow manual runs from the Actions tab / gh CLI
  workflow_dispatch:
  push:
    branches:
      - main
  # Run on each PR to main
  pull_request:
    branches:
      - main
  # Scheduled runs intentionally disabled: a cron trigger gets
  # auto-disabled after 60 days of repo inactivity, which also
  # silences the push and pull_request triggers above.
  # schedule:
  #   - cron: "0 3 * * *"

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Check all URLs
        run: ./scripts/verify-all-urls.bash
